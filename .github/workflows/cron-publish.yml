name: Cron publish

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      # Skips (not fails) until the app is deployed and APP_URL/CRON_SECRET
      # repo secrets are set — see README for setup once M6 deployment lands.
      - name: Call /api/cron/publish
        if: ${{ vars.CRON_ENABLED == 'true' }}
        run: |
          curl -sf -X GET "${APP_URL}/api/cron/publish" \
            -H "x-cron-secret: ${CRON_SECRET}"
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
